name: Mobile CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'mobile/**'

jobs:
  build_and_deploy_android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './mobile/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Build Android (EAS)
        run: npx eas build --platform android --profile preview --non-interactive
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ secrets.BACKEND_URL }}

      - name: Submit to Google Play (on release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx eas submit --platform android --non-interactive
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ secrets.BACKEND_URL }}
